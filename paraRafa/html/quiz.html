<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gabriel ❤️ Rafael — Quiz</title>
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/quiz.css" />
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div id="overlay" onclick="closeSidebar()"></div>

    <!-- Corner decorations -->
    <span class="deco-corner tl">💌</span>
    <span class="deco-corner tr">🌸</span>
    <span class="deco-corner bl">🌹</span>
    <span class="deco-corner br">💐</span>

    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebar-logo"><span>Gabriel ❤️ Rafael</span></div>
        <nav class="sidebar-nav">
            <a href="inicio.html"><span class="nav-icon">🏠</span> Início</a>
            <a href="quiz.html" class="active"><span class="nav-icon">💌</span> Quiz</a>
            <a href="fotos.html"><span class="nav-icon">📷</span> Fotos</a>
        </nav>
    </div>

    <!-- Header -->
    <header>
        <button id="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-title">Gabriel <span class="heart">❤️</span> Rafael</div>
        <div class="header-spacer"></div>
    </header>

    <main>
        <div class="quiz-wrapper">
            <div class="quiz-card">

                <!-- Start -->
                <div id="quiz-start">
                    <span class="quiz-icon">💌</span>
                    <h1>Quiz sobre nós</h1>
                    <p>Vamos ver o quanto você lembra dos nossos momentos juntos?<br>São 10 perguntas sobre a nossa
                        história. ❤️</p>
                    <button class="btn-primary" onclick="startQuiz()">Começar Quiz</button>
                </div>

                <!-- Question -->
                <div id="quiz-question">
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" id="quiz-fill" style="width:0%"></div>
                    </div>
                    <p class="quiz-qcount" id="quiz-qcount">Pergunta 1 de 10</p>
                    <p class="quiz-question-text" id="quiz-qtext"></p>
                    <div class="quiz-options" id="quiz-opts"></div>
                    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Próxima →</button>
                </div>

                <!-- Result -->
                <div id="quiz-result">
                    <span class="quiz-result-icon" id="result-icon">🌟</span>
                    <h2>Resultado do Quiz</h2>
                    <span class="quiz-score" id="result-score">0 / 10</span>
                    <p class="quiz-result-msg" id="result-msg"></p>
                    <button class="btn-primary" onclick="resetQuiz()">Jogar de novo 🔁</button>
                </div>

            </div>
        </div>
    </main>

    <script src="../js/shared.js"></script>
    <script src="../js/quiz.js"></script>
</body>

</html>
